<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
    .button { background-color: #007bff; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block; margin: 20px 0; }
    .footer { color: #999; font-size: 12px; margin-top: 30px; border-top: 1px solid #eee; padding-top: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome to Attendance</h1>
    <p>Hello {{name}},</p>
    <p>Please verify your admin email by clicking the button below:</p>
    <p><a href="{{verifyUrl}}" class="button">Verify Email</a></p>
    <p>Or copy this link: <a href="{{verifyUrl}}">{{verifyUrl}}</a></p>
    <p>If you did not request this, you can ignore this email.</p>
    <div class="footer">
      <p>&copy; {{year}} Attendance System. All rights reserved.</p>
    </div>
  </div>
</body>
</html>
