<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: Arial, sans-serif; color: #1f2937; line-height: 1.6; }
    .container { max-width: 640px; margin: 0 auto; padding: 20px; }
    .card { border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; background: #f9fafb; }
    .meta { color: #6b7280; font-size: 13px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Reset Admin Password</h2>
    <div class="card">
      <p>A password reset was requested for your Attendance admin account.</p>
      <p>Use this link to reset your password:</p>
      <p><a href="{{resetUrl}}">Reset admin password</a></p>
      <p>If the link does not open, copy and paste this URL into your browser:</p>
      <p>{{resetUrl}}</p>
      <p class="meta">Requested at: {{happenedAtISO}}</p>
    </div>
  </div>
</body>
</html>
