<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: Arial, sans-serif; color: #1f2937; line-height: 1.6; }
    .container { max-width: 640px; margin: 0 auto; padding: 20px; }
    .card { border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; background: #f9fafb; }
    .password { font-family: monospace; font-size: 16px; background: #111827; color: #f9fafb; display: inline-block; padding: 8px 10px; border-radius: 6px; }
    .meta { color: #6b7280; font-size: 13px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Staff Login Password Updated</h2>
    <div class="card">
      <p>Your organization <strong>{{organizationName}}</strong> has updated the shared staff login password.</p>
      <p>New staff login password:</p>
      <p class="password">{{staffLoginPassword}}</p>
      <p class="meta">Updated at: {{happenedAtISO}}</p>
    </div>
  </div>
</body>
</html>
