<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.6; color: #1f2937; }
    .container { max-width: 640px; margin: 0 auto; padding: 20px; }
    .card { border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; background: #f9fafb; }
    .meta { color: #6b7280; font-size: 13px; }
    .details { margin: 14px 0; padding-left: 18px; }
    .footer { color: #6b7280; font-size: 12px; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>{{activityType}}</h2>
    <div class="card">
      <p><strong>Organization:</strong> {{organizationName}}</p>
      <p><strong>Summary:</strong> {{summary}}</p>
      <p class="meta"><strong>Triggered by:</strong> {{actor}}</p>
      <p class="meta"><strong>Time:</strong> {{happenedAtISO}}</p>
      {{#if details.length}}
      <p><strong>Details:</strong></p>
      <ul class="details">
        {{#each details}}
          <li><strong>{{this.label}}:</strong> {{this.value}}</li>
        {{/each}}
      </ul>
      {{/if}}
    </div>
    <p class="footer">This is an automated activity alert from Attendance.</p>
  </div>
</body>
</html>
